name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Create release archive
        run: |
          tar -czf lia-${{ github.ref_name }}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            prisma/ \
            README.md \
            LICENSE \
            docker-compose.yml \
            Dockerfile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎉 Release ${{ github.ref_name }}

            ## Installation

            ### Docker (Recommended)
            ```bash
            docker pull ghcr.io/eplord/lia:${{ github.ref_name }}
            ```

            ### From Source
            ```bash
            wget https://github.com/eplord/lia/releases/download/${{ github.ref_name }}/lia-${{ github.ref_name }}.tar.gz
            tar -xzf lia-${{ github.ref_name }}.tar.gz
            npm install --production
            npm start
            ```

            ## Docker Images
            - `ghcr.io/eplord/lia:${{ github.ref_name }}`
            - `ghcr.io/eplord/lia:latest`

            ## Documentation
            See [CHANGELOG.md](https://github.com/eplord/lia/blob/master/CHANGELOG.md) for details.
          files: |
            lia-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eplord/lia
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
