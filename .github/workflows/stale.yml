name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue settings
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs within 7 days.

            If this issue is still relevant, please leave a comment to keep it open.
            Thank you for your contributions! 🙏

          close-issue-message: |
            This issue was automatically closed due to inactivity.

            If you believe this issue is still relevant, please reopen it or create a new issue
            with updated information. Thank you! 🙏

          days-before-issue-stale: 60
          days-before-issue-close: 7

          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,roadmap,good first issue'

          # PR settings
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs within 7 days.

            If this PR is still being worked on, please leave a comment to keep it open.
            Thank you for your contribution! 🙏

          close-pr-message: |
            This pull request was automatically closed due to inactivity.

            If you'd like to continue working on this, please reopen the PR or create a new one.
            Thank you for your contribution! 🙏

          days-before-pr-stale: 30
          days-before-pr-close: 7

          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress'

          # Other settings
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
