version: '3.8'

services:
  # Main Lia application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lia:lia_password@postgres:5432/lia
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio
    networks:
      - lia-network
    volumes:
      - ./storage:/app/storage

  # PostgreSQL database
  postgres:
    image: postgres:14-alpine
    container_name: lia-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=lia
      - POSTGRES_PASSWORD=lia_password
      - POSTGRES_DB=lia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: lia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch for full-text search
  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: lia-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_ENV=production
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - lia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: lia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - lia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lia-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  minio-data:
